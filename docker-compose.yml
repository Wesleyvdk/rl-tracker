services:
  bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: rl-tracker-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      PUPPETEER_EXECUTABLE_PATH: /usr/bin/chromium
      DATABASE_PATH: /app/data/database.sqlite
    volumes:
      - sqlite_data:/app/data
    shm_size: "1gb"

volumes:
  sqlite_data:
